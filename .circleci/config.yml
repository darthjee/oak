version: 2
workflows:
  version: 2
  test:
    jobs:
      - test:
          filters:
            tags:
              only: /.*/
      - checks:
          filters:
            tags:
              only: /.*/
      - jasmine:
          filters:
            tags:
              only: /.*/
      - coverage-final:
          requires: [test, jasmine]
          filters:
            tags:
              only: /.*/
      - frontend-checks:
          filters:
            tags:
              only: /.*/
      - build-and-release:
          requires: [test, checks, jasmine, frontend-checks]
          filters:
            tags:
              only: /\d+\.\d+\.\d+/
            branches:
              ignore: /.*/
      - upload_proxy_files:
          requires: [test, checks, jasmine, frontend-checks]
          filters:
            tags:
              only: /\d+\.\d+\.\d+/
            branches:
              ignore: /.*/
      - release:
          requires: [build-and-release, upload_proxy_files]
          filters:
            tags:
              only: /\d+\.\d+\.\d+/
            branches:
              ignore: /.*/
      - warm-up-cache:
          requires: [release]
          filters:
            tags:
              only: /\d+\.\d+\.\d+/
            branches:
              ignore: /.*/
jobs:
  test:
    docker:
      - image: darthjee/circleci_oak-base:0.0.4
        environment:
          OAK_MYSQL_HOST: mysql
          OAK_MYSQL_PORT: 3306
          OAK_MYSQL_USER: oak
          OAK_MYSQL_NAME: oak
          OAK_MYSQL_PASSWORD: oak
          OAK_PASSWORD_SALT: abcd
          OAK_REDIRECT_DOMAIN: localhost:3000
      - image: circleci/mysql:5.7
        name: mysql
        environment:
          MYSQL_DATABASE: oak_test
          MYSQL_USER: oak
          MYSQL_PASSWORD: oak
    steps:
      - checkout
      - run:
          name: Bundle Install
          command: cd source && bundle install
      - run:
          name: Yarn Install
          command: cd source && yarn install
      - run:
          name: Wait for database
          command: cd source && scripts/wait_for_db.sh
      - run:
          name: Migrate
          command: cd source && RAILS_ENV=test bundle exec rake db:schema:load
      - run:
          name: RSpec
          command: cd source && bundle exec rspec
      - run:
          name: Change coverage file
          command: sed -e s/SF:\./SF:source/g -i source/coverage/lcov/source.lcov
      - run:
          name: Upload coverage to Codacy (partial)
          command: cd source && bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov/source.lcov

  coverage-final:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - run:
          name: Finalize coverage on Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) final

  checks:
    docker:
      - image: darthjee/circleci_oak-base:0.0.4
        environment:
          OAK_MYSQL_HOST: mysql
          OAK_MYSQL_PORT: 3306
          OAK_MYSQL_USER: oak
          OAK_MYSQL_NAME: oak
          OAK_MYSQL_PASSWORD: oak
          OAK_PASSWORD_SALT: abcd
          OAK_REDIRECT_DOMAIN: localhost:3000
      - image: circleci/mysql:5.7
        name: mysql
        environment:
          MYSQL_DATABASE: oak_test
          MYSQL_USER: oak
          MYSQL_PASSWORD: oak
    steps:
      - checkout
      - run:
          name: Set folder
          command: cp source/* source/.??* ./ -r; rm source -rf
      - run:
          name: Bundle Install
          command: bundle install
      - run:
          name: Rubocop
          command: rubocop
  jasmine:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Set folder
          command: rm source -rf; cp frontend/* frontend/.??* ./ -r; rm frontend -rf
      - run:
          name: Yarn install
          command: yarn install
      - run:
          name: Tests
          command: npm run coverage
      - run:
          name: Upload coverage to Codacy (partial)
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov.info
  frontend-checks:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Set folder
          command: rm source -rf; cp frontend/* frontend/.??* ./ -r; rm frontend -rf
      - run:
          name: Yarn install
          command: yarn install
      - run:
          name: Check JS Lint
          command: npm run lint
  build-and-release:
    machine: true
    steps:
      - checkout
      - run:
          name: Trigger Deploy
          command: scripts/deploy.sh deploy
  upload_proxy_files:
    docker:
      - image: darthjee/tent:0.7.6
    workdir: /var/www/html
    steps:
      - checkout
      - run:
          name: Generate key file
          command: deploy_frontend.sh generate_key_file
      - run:
          name: Upload proxy files
          command: SOURCE=/var/www/html/ deploy_frontend.sh upload
      - run:
          name: Copy configuration files
          command: TARGET=configuration/ deploy_frontend.sh copy_files
  release:
    docker:
      - image: darthjee/vite_weave-base:0.0.4
    steps:
      - checkout
      - run:
          name: Generate key file
          command: deploy_frontend.sh generate_key_file
      - run:
          name: Release assets
          command: deploy_frontend.sh release
  warm-up-cache:
    docker:
      - image: darthjee/navi-hey:latest
    steps:
      - checkout
      - run:
          name: Warm up proxy cache
          command: navi-hey --config .circleci/navi_config.yaml
