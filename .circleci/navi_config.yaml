web:
  port: $NAVI_PORT
workers:
  quantity: 5
  retry_cooldown: 10000
  sleep: 500
  max-retries: 50

failure:
  threshold: 0.0

clients:
  default:
    base_url: $OAK_PRODUCTION_URL
    timeout: 20000

resources:
  user_navigation:
    - url: /user/categories.json
      status: 200

  categories:
    - url: /categories.json
      status: 200
      paginated_actions:
        - resource: paginated_categories
          pagination:
            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false

  paginated_categories:
    - url: /categories.json?page={:page}
      status: 200
      actions:
        - resource: category
          parameters:
            slug: parsedBody.slug
        - resource: category_items
          parameters:
            category_slug: parsedBody.slug

  category:
    - url: /categories/{:slug}.json
      status: 200

  category_items:
    - url: /categories/{:category_slug}/items.json
      status: 200
      paginated_actions:
        - resource: paginated_category_items
          pagination:
            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false

  paginated_category_items:
    - url: /categories/{:category_slug}/items.json?page={:page}
      status: 200
      actions:
        - resource: category_item
          parameters:
            id: parsedBody.id
            category_slug: parsedBody.category_slug

  category_item:
    - url: /categories/{:category_slug}/items/{:id}.json
      status: 200

  kinds:
    - url: /kinds.json
      status: 200
      paginated_actions:
        - resource: paginated_kinds
          pagination:
            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false

  paginated_kinds:
    - url: /kinds.json?page={:page}
      status: 200
      actions:
        - resource: kind
          parameters:
            slug: parsedBody.slug

  kind:
    - url: /kinds/{:slug}.json
      status: 200
